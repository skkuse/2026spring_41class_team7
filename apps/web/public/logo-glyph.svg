<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E06C4D"/>
      <stop offset="100%" stop-color="#C65D3E"/>
    </linearGradient>
  </defs>

  <!-- 3 claw slash marks -->
  <!-- Left claw -->
  <path d="M12 58 C16 44 18 30 20 8" stroke="url(#grad)" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Center claw (tallest) -->
  <path d="M26 60 C30 44 32 26 32 4" stroke="url(#grad)" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Right claw -->
  <path d="M40 58 C42 44 46 30 52 8" stroke="url(#grad)" stroke-width="6" stroke-linecap="round" fill="none"/>
</svg>
