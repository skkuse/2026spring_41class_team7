<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E06C4D"/>
      <stop offset="100%" stop-color="#C65D3E"/>
    </linearGradient>
  </defs>

  <!-- Glyph: claw mark (3 slash marks like a claw swipe) -->
  <g transform="translate(4, 4)">
    <!-- Left claw slash -->
    <path d="M8 52 C12 40 14 28 18 8" stroke="url(#grad)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- Center claw slash (tallest) -->
    <path d="M20 56 C24 40 26 24 28 2" stroke="url(#grad)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <!-- Right claw slash -->
    <path d="M32 52 C34 40 36 28 42 8" stroke="url(#grad)" stroke-width="5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Divider -->
  <line x1="64" y1="10" x2="64" y2="54" stroke="#E06C4D" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- JOBCLAW wordmark -->
  <text x="76" y="45" font-family="'Arial Black', 'Arial', sans-serif" font-weight="900" font-size="30" letter-spacing="2" fill="url(#grad)">JOBCLAW</text>
</svg>
